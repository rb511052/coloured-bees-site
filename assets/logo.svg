<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="Coloured Bees Consulting logo variation C">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700&amp;display=swap');
      .word { font-family: 'Bricolage Grotesque', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Honeycomb cluster, one cell holds bee stripes -->
  <g transform="translate(10,8)">
    <!-- top: striped bee cell -->
    <g>
      <clipPath id="hexC">
        <polygon points="52,0 78,15 78,45 52,60 26,45 26,15"/>
      </clipPath>
      <g clip-path="url(#hexC)">
        <rect x="26" y="0" width="52" height="15" fill="#1F1B16"/>
        <rect x="26" y="15" width="52" height="15" fill="#E8A013"/>
        <rect x="26" y="30" width="52" height="15" fill="#1F1B16"/>
        <rect x="26" y="45" width="52" height="15" fill="#E8A013"/>
      </g>
    </g>
    <!-- bottom-left: teal -->
    <polygon points="26,46 52,61 52,91 26,106 0,91 0,61" fill="#0F7B6C"/>
    <!-- bottom-right: violet -->
    <polygon points="78,46 104,61 104,91 78,106 52,91 52,61" fill="#6B4FA3"/>
  </g>
  <g>
    <text x="140" y="62" class="word" font-size="42" font-weight="700" fill="#1F1B16">Coloured Bees</text>
    <text x="142" y="96" class="word" font-size="22" font-weight="500" letter-spacing="8" fill="#6E675C">CONSULTING</text>
  </g>
</svg>
