<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 158" role="img" aria-label="Coloured Bees robot bee mark, inverse for dark backgrounds">
  <!-- wings: honey, single colour -->
  <ellipse cx="26" cy="72" rx="26" ry="13" fill="#E8A013" opacity="0.4" transform="rotate(-28 26 72)"/>
  <ellipse cx="114" cy="72" rx="26" ry="13" fill="#E8A013" opacity="0.4" transform="rotate(28 114 72)"/>

  <!-- antennae -->
  <g fill="none" stroke="#E8A013" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="62,24 55,15 61,8"/>
    <polyline points="78,24 85,15 79,8"/>
  </g>
  <circle cx="61" cy="7" r="4.5" fill="#E8A013"/>
  <circle cx="79" cy="7" r="4.5" fill="#E8A013"/>

  <!-- body: striped honeycomb cell (ink swapped to paper) -->
  <clipPath id="cbBodyHexInv"><polygon points="70,84 96,99 96,129 70,144 44,129 44,99"/></clipPath>
  <g clip-path="url(#cbBodyHexInv)">
    <rect x="44" y="84" width="52" height="15" fill="#E8A013"/>
    <rect x="44" y="99" width="52" height="15" fill="#FFFFFF"/>
    <rect x="44" y="114" width="52" height="15" fill="#E8A013"/>
    <rect x="44" y="129" width="52" height="15" fill="#FFFFFF"/>
  </g>

  <!-- head: rounded hexagon (paper) -->
  <polygon points="70,18 98,34 98,66 70,82 42,66 42,34" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round"/>

  <!-- visor + eyes -->
  <rect x="50" y="34" width="40" height="22" rx="11" fill="#1F1B16" stroke="#E8A013" stroke-width="2"/>
  <rect x="56" y="39" width="13" height="13" rx="3.5" fill="#E8A013"/>
  <rect x="74" y="41" width="9" height="9" rx="2.5" fill="#E8A013"/>

  <!-- smile -->
  <path d="M 63 66 Q 70 72 77 66" fill="none" stroke="#E8A013" stroke-width="2.5" stroke-linecap="round"/>
</svg>
